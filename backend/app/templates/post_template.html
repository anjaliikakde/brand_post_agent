<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>

body {
    margin: 0;
    width: 1080px;
    height: 1080px;
    font-family: Arial, Helvetica, sans-serif;
    background: #111;
    color: white;
}

.container {
    position: relative;
    width: 1080px;
    height: 1080px;
}

.image {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.overlay {
    position: absolute;
    bottom: 0;
    background: rgba(0,0,0,0.6);
    width: 100%;
    padding: 60px;
}

h1 {
    font-size: 60px;
    margin-bottom: 20px;
}

p {
    font-size: 32px;
}

</style>
</head>

<body>

<div class="container">

<img class="image" src="{{image_path}}" />

<div class="overlay">

<h1>{{headline}}</h1>

<p>{{caption}}</p>

</div>

</div>

</body>
</html>
